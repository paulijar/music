name: PHP Integration Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  intgr-tests:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - nc: 28.0.0
            php: 8.0
            db: sqlite
          - nc: 31.0.12
            php: 8.2
            db: pgsql
          - nc: 32.0.3
            php: 8.4
            db: mysql
          - nc: 33.0.0
            php: 8.5
            db: sqlite
          - nc: 34.0.0beta2
            php: 8.5
            db: pgsql

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v5
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Restore cached SW package
      id: server-cache-restore
      uses: actions/cache/restore@v4
      with:
        path: /tmp/nc_music_ci/server
        key: nextcloud-${{ matrix.nc }}

    - name: Download the cloud SW package
      if: steps.server-cache-restore.outputs.cache-hit != 'true'
      run: tests/scripts/downloadServerForCi.sh ${{ matrix.nc }}

    - name: Save SW package to cache
      id: server-cache-save
      if: steps.server-cache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: /tmp/nc_music_ci/server
        key: nextcloud-${{ matrix.nc }}

    - name: Setup CI env
      run: tests/scripts/setupEnvForCi.sh ${{ matrix.db }}

    - name: Run integration tests
      working-directory: /tmp/nc_music_ci/server/apps/music
      run: composer run-script integration-tests

    - name: Run behat tests
      run: |
          php -S localhost:8888 -t /tmp/nc_music_ci/server &
          cp tests/behat.yml.ci_tests tests/behat.yml
          composer run-script behat

    - name: Check log
      if: success() || failure()
      run: cat /tmp/nc_music_ci/data/nextcloud.log